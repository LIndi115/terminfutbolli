<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAMP Match Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ramp-yellow: #ffcc00;
            --red: #ff4d4d;
            --green: #39ff14;
            --dark-card: rgba(15, 15, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            /* ZGJIDHJA PER TOPAT: E bejme sfondin te pershtatet me gjerosine */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                              url('https://images.unsplash.com/photo-1551958219-acbc608c6377?q=80&w=2070&auto=format&fit=crop');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* Per PC rri fiks */
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* RREGULLIMI SPECIFIK QE TOPAT TE DALIN NE TEL */
        @media (max-width: 600px) {
            body {
                /* Ky eshte rreshti magjik: detyron topat te jene brenda gjeresise se telit */
                background-size: 100% auto !important; 
                background-position: center 20%; /* E ngremë pak foton lart që topat të jenë në nivel me kartelën */
            }
            .ramp-card {
                width: 88% !important;
                max-width: 330px !important;
                padding: 30px 20px !important;
                /* I japim pak transparence qe te shihet fusha mbrapa */
                background: rgba(15, 15, 15, 0.9); 
            }
        }

        .ramp-card {
            background: var(--dark-card);
            backdrop-filter: blur(10px);
            width: 95%;
            max-width: 380px;
            padding: 40px 25px;
            border-radius: 25px;
            border: 1px solid rgba(255,204,0,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 10;
        }

        h1 { color: var(--ramp-yellow); font-size: 28px; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 5px; }
        .sub-txt { color: white; font-size: 10px; letter-spacing: 5px; margin-bottom: 25px; opacity: 0.6; text-transform: uppercase; }

        .p-input {
            width: 100%; background: #000; border: 2px solid #333; padding: 15px;
            border-radius: 12px; color: white; font-size: 18px; text-align: center;
            outline: none; margin-bottom: 15px;
        }
        .p-input:focus { border-color: var(--ramp-yellow); }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin-bottom: 12px; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-yellow { background: var(--ramp-yellow); color: black; }
        .btn-green { background: var(--green); color: black; }
        .btn-red { background: var(--red); color: white; }

        .info-panel { background: rgba(255, 204, 0, 0.05); border: 1px solid rgba(255, 204, 0, 0.2); padding: 15px; border-radius: 15px; margin: 15px 0; color: white; text-align: left; font-size: 13px; }
        .squad-list { margin-top: 15px; max-height: 200px; overflow-y: auto; text-align: left; }
        .player-row {
            background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 10px;
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--green); color: white; font-size: 13px;
        }

        #step-confirm, #step-list { display: none; }
    </style>
</head>
<body>

<div class="ramp-card">
    <div id="step-check">
        <div style="font-size: 35px; color: var(--ramp-yellow); margin-bottom: 10px;"><i class="fas fa-id-card"></i></div>
        <h1>RAMP FUTBOLL</h1>
        <div class="sub-txt">Match Center</div>
        <p style="color: #888; font-size: 12px; margin-bottom: 20px;">Shëno ID-në tënde për të hyrë</p>
        <input type="text" id="pID" class="p-input" placeholder="Shkruaj ID..." inputmode="numeric">
        <button class="btn btn-yellow" onclick="kontrolloID()">IDENTIFIKOHU <i class="fas fa-arrow-right"></i></button>
    </div>

    <div id="step-confirm">
        <h2 id="userName" style="color:var(--ramp-yellow); margin-bottom: 10px; font-style: italic;">...</h2>
        <div class="info-panel" id="matchData"></div>
        <div id="statusResult"></div>
        <button class="btn btn-green" onclick="ekzekutoKonfirmimin(true)">PO, VIJ ✅</button>
        <button class="btn btn-red" onclick="ekzekutoKonfirmimin(false)">JO ❌</button>
    </div>

    <div id="step-list">
        <h3 id="finalMsg" style="margin-bottom: 5px; color: var(--ramp-yellow);"></h3>
        <p id="matchInfoSmall" style="font-size:11px; color:white; margin-bottom:15px; opacity: 0.7;"></p>
        <div class="squad-list" id="finalList"></div>
        <button class="btn btn-yellow" style="margin-top:15px; background:none; border:1px solid #444; color:white;" onclick="location.reload()">DIL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lojtari = null;
    let matchID = "";
    let matchDetailsHTML = "";

    async function kontrolloID() {
        const id = document.getElementById('pID').value.trim();
        if(!id) return;
        const mainDoc = await db.collection("config").doc("main").get();
        const staffDoc = await db.collection("config").doc("staff").get();
        const d = mainDoc.data();
        const p = staffDoc.data().lojtaret.find(x => x.id === id);
        if(!p) return alert("ID e gabuar!");
        lojtari = p;
        const cleanVendi = d.vendi.replace(/\s+/g, '-').toLowerCase();
        matchID = `match_${d.data.replace(/\./g, '-')}_${d.ora.replace(/:/g, '-')}_${cleanVendi}`;
        matchDetailsHTML = `📍 ${d.vendi}<br>📅 ${d.data} | Ora: ${d.ora}`;
        document.getElementById('matchInfoSmall').innerHTML = matchDetailsHTML;
        const currentMatch = await db.collection("matches").doc(matchID).get();
        let list = currentMatch.exists ? currentMatch.data().pjesemarresit : [];
        const konfirmimi = list.find(x => x.id === id);
        if(konfirmimi) {
            document.getElementById('finalMsg').innerText = konfirmimi.vjen ? "MIRËSEVEPRORE! ✅" : "PËRSHËNDETJE! ❌";
            shfaqListen(list);
            switchStep('step-list');
        } else {
            document.getElementById('userName').innerText = p.n;
            document.getElementById('matchData').innerHTML = matchDetailsHTML;
            switchStep('step-confirm');
        }
    }

    async function ekzekutoKonfirmimin(vjen) {
        const ref = db.collection("matches").doc(matchID);
        const doc = await ref.get();
        let list = doc.exists ? doc.data().pjesemarresit : [];
        list = list.filter(x => x.id !== lojtari.id);
        list.push({ n: lojtari.n, id: lojtari.id, vjen: vjen });
        await ref.set({ pjesemarresit: list });
        shfaqListen(list);
        document.getElementById('finalMsg').innerText = vjen ? "U KONFIRMOVE! ✅" : "U REGJISTRUA! ❌";
        switchStep('step-list');
    }

    function shfaqListen(lista) {
        const div = document.getElementById('finalList');
        div.innerHTML = "";
        lista.filter(x => x.vjen).forEach((p, i) => {
            div.innerHTML += `<div class="player-row"><span>${i+1}. ${p.n}</span><i class="fas fa-check-circle" style="color:var(--green)"></i></div>`;
        });
    }

    function switchStep(stepId) {
        document.getElementById('step-check').style.display = "none";
        document.getElementById('step-confirm').style.display = "none";
        document.getElementById('step-list').style.display = "none";
        document.getElementById(stepId).style.display = "block";
    }
</script>
</body>
</html>
