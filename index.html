<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N'FORMË FITNESS | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; --dark: #050505; --card: #111111;
            --border: rgba(16, 185, 129, 0.2); --success: #10b981;
            --danger: #ff4d4d; --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--dark); color: white; padding-bottom: 50px; }
        
        /* Login Style */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid var(--primary);
            width: 90%; max-width: 400px; text-align: center;
        }

        header { 
            padding: 20px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .container { max-width: 900px; margin: auto; padding: 20px; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center;
            border-top: 4px solid var(--primary); cursor: pointer; transition: 0.3s;
        }
        .stat-card:active { transform: scale(0.95); }
        .stat-card h3 { font-size: 1.4rem; }
        .stat-card p { font-size: 0.6rem; opacity: 0.7; text-transform: uppercase; font-weight: 800; }

        /* Search */
        #searchInput { width: 100%; padding: 18px; border-radius: 15px; background: var(--card); border: 1px solid var(--border); color: white; text-align: center; outline: none; margin-bottom: 20px; }
        
        /* Lists */
        .list-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); display: none; margin-bottom: 20px; overflow: hidden; }
        .list-header { padding: 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .result-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .result-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid var(--primary); }

        /* Profile */
        .player-profile { background: var(--card); border-radius: 25px; border: 1px solid var(--border); padding: 30px; margin-top: 20px; display: none; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .profile-img-large { width: 100px; height: 100px; border-radius: 20px; object-fit: cover; border: 2px solid var(--primary); cursor: zoom-in; }
        
        .status-badge { padding: 10px 20px; border-radius: 12px; font-weight: 800; display: inline-block; margin-bottom: 20px; width: 100%; text-align: center; }
        .status-active { background: rgba(16, 185, 129, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .status-expired { background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .status-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid var(--warning); }

        /* History */
        .history-list { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; font-size: 0.85rem; max-height: 200px; overflow-y: auto; }
        .history-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }

        /* Buttons & Modals */
        .btn-main { background: var(--primary); color: black; border: none; padding: 15px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-danger { background: none; color: var(--danger); border: 1px solid var(--danger); padding: 12px; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 100%; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #121212; padding: 25px; border-radius: 30px; width: 95%; max-width: 400px; border: 1px solid var(--border); }
        
        /* FULL SCREEN IMAGE VIEWER */
        #fullscreenViewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,1); z-index: 5000; justify-content: center; align-items: center;
        }
        #fullscreenViewer img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #fullscreenViewer .close-view { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: white; cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50%; }

        input { width:100%; padding:15px; border-radius:12px; background:#000; border:1px solid var(--border); color:white; margin-bottom:15px; outline:none; }
    </style>
</head>
<body>

    <!-- Full Screen Image -->
    <div id="fullscreenViewer" onclick="this.style.display='none'">
        <span class="close-view">✕</span>
        <img id="fullImage" src="">
    </div>

    <div id="loginOverlay">
        <div class="login-card">
            <h1 style="color: var(--primary); font-weight: 900;">N'FORMË</h1>
            <p style="opacity: 0.5; margin-bottom: 20px;">Sistemi i Menaxhimit</p>
            <input type="password" id="pass" placeholder="Fjalëkalimi">
            <button class="btn-main" onclick="handleLogin()">KYÇU</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <header>
            <div style="font-weight: 900; color: var(--primary);">N'FORMË</div>
            <button class="btn-main" style="width:auto; margin:0;" onclick="openModal('regModal')">+ SHTO</button>
        </header>

        <div class="container">
            <div class="stats-grid">
                <div class="stat-card" onclick="showFilteredList('active')">
                    <h3 id="stat-active">0</h3>
                    <p>Aktivë</p>
                </div>
                <div class="stat-card" onclick="showFilteredList('expired')">
                    <h3 id="stat-expired" style="color: var(--danger);">0</h3>
                    <p>Të skaduar</p>
                </div>
            </div>

            <input type="text" id="searchInput" placeholder="Kërko anëtarin..." onkeyup="searchPlayer()">

            <div id="filteredListContainer" class="list-container">
                <div class="list-header">
                    <span id="listTitle" style="font-weight: 800; font-size: 0.8rem; color: var(--primary);">LISTA</span>
                    <span style="cursor:pointer; opacity:0.5" onclick="closeFilteredList()">MBYLL ✕</span>
                </div>
                <div id="filteredResults"></div>
            </div>

            <div id="playerProfile" class="player-profile">
                <div style="color: var(--primary); cursor: pointer; margin-bottom: 15px; font-weight: 800;" onclick="closeProfile()">← MBALLINA</div>
                
                <div class="profile-header">
                    <img id="viewImg" src="" class="profile-img-large" onclick="openFullScreen(this.src)">
                    <div>
                        <h2 id="viewName">---</h2>
                        <p id="regDate" style="font-size: 0.7rem; opacity: 0.5;"></p>
                    </div>
                </div>

                <div id="statusBadge" class="status-badge">---</div>
                <button class="btn-main" onclick="openModal('payModal')">PAGUAJ +30 DITË</button>
                <h4 style="margin: 20px 0 10px 0; font-size: 0.7rem; opacity: 0.6; letter-spacing: 1px;">HISTORIKU</h4>
                <div class="history-list" id="paymentHistory"></div>
                <button class="btn-danger" onclick="openModal('deleteModal')">Fshij Anëtarin</button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="regModal" class="modal">
        <div class="modal-content">
            <h3>Anëtar i Ri</h3><br>
            <input type="file" id="regFoto" accept="image/*">
            <input type="text" id="regName" placeholder="Emri dhe Mbiemri">
            <button class="btn-main" id="saveBtn" onclick="saveNewPlayer()">RUAJ</button>
            <button class="btn-danger" style="border:none" onclick="closeModal('regModal')">ANULO</button>
        </div>
    </div>

    <div id="payModal" class="modal">
        <div class="modal-content">
            <h3>Konfirmo Pagesën</h3><br>
            <input type="number" id="payAmount" value="20">
            <button class="btn-main" onclick="executePayment()">KONFIRMO</button>
            <button class="btn-danger" style="border:none" onclick="closeModal('payModal')">ANULO</button>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--danger);">Siguria e Sistemit</h3><br>
            <input type="password" id="deletePass" placeholder="Fjalëkalimi i sistemit">
            <button class="btn-main" style="background: var(--danger); color: white;" onclick="confirmDelete()">FSHIJ</button>
            <button class="btn-main" style="background: #333; color: white;" onclick="closeModal('deleteModal')">ANULO</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const IMGBB_API_KEY = "eb62a6907856c805db10887e57fa34ea";
        const ADMIN_PASS = "admin2026"; 

        const firebaseConfig = {
            apiKey: "AIzaSyBh_7bwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
            authDomain: "herolind-6ca5f.firebaseapp.com",
            projectId: "herolind-6ca5f"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);
        const playersRef = collection(dbCloud, "fitness_members");

        let players = [];
        let currentId = null;

        window.handleLogin = () => {
            if(document.getElementById('pass').value === ADMIN_PASS) {
                sessionStorage.setItem('nforme_auth', 'true');
                location.reload();
            } else { alert("Fjalëkalim i gabuar!"); }
        };

        if(sessionStorage.getItem('nforme_auth') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            onSnapshot(playersRef, (snapshot) => {
                players = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateDashboard();
                if(currentId) openProfile(currentId);
            });
        }

        // Funksioni për Full Screen Image
        window.openFullScreen = (url) => {
            document.getElementById('fullImage').src = url;
            document.getElementById('fullscreenViewer').style.display = 'flex';
        };

        window.showFilteredList = (type) => {
            const container = document.getElementById('filteredListContainer');
            const results = document.getElementById('filteredResults');
            const title = document.getElementById('listTitle');
            let filtered = [];
            const today = new Date();

            if(type === 'active') {
                title.innerText = "ANËTARËT AKTIVË";
                filtered = players.filter(p => p.expireDate && new Date(p.expireDate) > today);
            } else {
                title.innerText = "ANËTARËT E SKADUAR";
                filtered = players.filter(p => !p.expireDate || new Date(p.expireDate) <= today);
            }

            results.innerHTML = filtered.map(p => `
                <div class="result-item">
                    <img src="${p.photoUrl}" onclick="event.stopPropagation(); openFullScreen('${p.photoUrl}')">
                    <div style="flex-grow: 1;" onclick="openProfile('${p.id}')">
                        <div style="font-weight: 800;">${p.name}</div>
                        <div style="font-size: 0.6rem; opacity: 0.5;">${p.expireDate ? 'Deri: ' + new Date(p.expireDate).toLocaleDateString('sq-AL') : 'Ska pagesë'}</div>
                    </div>
                </div>
            `).join('');
            container.style.display = 'block';
            document.getElementById('playerProfile').style.display = 'none';
        };

        window.closeFilteredList = () => document.getElementById('filteredListContainer').style.display = 'none';

        window.openProfile = (id) => {
            currentId = id;
            const p = players.find(x => x.id === id);
            if(!p) return;
            document.getElementById('playerProfile').style.display = 'block';
            document.getElementById('filteredListContainer').style.display = 'none';
            document.getElementById('viewName').innerText = p.name;
            document.getElementById('viewImg').src = p.photoUrl;
            document.getElementById('regDate').innerText = "Regjistruar: " + p.registeredAt;
            
            const badge = document.getElementById('statusBadge');
            const today = new Date();
            if(!p.expireDate) {
                badge.innerText = "PA PAGESË";
                badge.className = "status-badge status-expired";
            } else {
                const exp = new Date(p.expireDate);
                const diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
                if(diff < 0) {
                    badge.innerText = `SKADUAR (Para ${Math.abs(diff)} ditëve)`;
                    badge.className = "status-badge status-expired";
                } else if(diff <= 5) {
                    badge.innerText = `SKADON PAS ${diff} DITËVE`;
                    badge.className = "status-badge status-warning";
                } else {
                    badge.innerText = `AKTIV (${diff} ditë mbetura)`;
                    badge.className = "status-badge status-active";
                }
            }
            document.getElementById('paymentHistory').innerHTML = (p.payments || []).map(pay => `
                <div class="history-item">
                    <span>${pay.amount}€ (${pay.date})</span>
                    <span style="color:var(--primary)">Skadon: ${new Date(pay.newExpire).toLocaleDateString('sq-AL')}</span>
                </div>
            `).reverse().join('');
        };

        window.executePayment = async () => {
            const amount = document.getElementById('payAmount').value;
            const p = players.find(x => x.id === currentId);
            let startDate = new Date();
            if(p.expireDate && new Date(p.expireDate) > new Date()) startDate = new Date(p.expireDate);
            const newExpire = new Date(startDate);
            newExpire.setDate(newExpire.getDate() + 30);
            const newPay = { amount: amount || "20", date: new Date().toLocaleDateString('sq-AL'), newExpire: newExpire.toISOString() };
            const updated = p.payments ? [...p.payments, newPay] : [newPay];
            await updateDoc(doc(dbCloud, "fitness_members", currentId), { payments: updated, expireDate: newExpire.toISOString() });
            closeModal('payModal');
        };

        window.confirmDelete = async () => {
            if(document.getElementById('deletePass').value === ADMIN_PASS) {
                await deleteDoc(doc(dbCloud, "fitness_members", currentId));
                closeModal('deleteModal');
                closeProfile();
            } else { alert("Fjalëkalimi i gabuar!"); }
        };

        window.saveNewPlayer = async () => {
            const name = document.getElementById('regName').value;
            const fileInput = document.getElementById('regFoto');
            if(!name) return;
            document.getElementById('saveBtn').innerText = "Duke u ruajtur...";
            let photoUrl = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            if(fileInput.files[0]) {
                const fd = new FormData(); fd.append("image", fileInput.files[0]);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                const d = await res.json(); photoUrl = d.data.url;
            }
            await addDoc(playersRef, { name, photoUrl, payments: [], expireDate: null, registeredAt: new Date().toLocaleDateString('sq-AL') });
            closeModal('regModal');
            document.getElementById('saveBtn').innerText = "RUAJ";
        };

        window.updateDashboard = () => {
            let active = 0, expired = 0;
            const today = new Date();
            players.forEach(p => {
                if(p.expireDate && new Date(p.expireDate) > today) active++;
                else expired++;
            });
            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-expired').innerText = expired;
        };

        window.searchPlayer = () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('filteredListContainer');
            const results = document.getElementById('filteredResults');
            if(val.length > 0) {
                const filtered = players.filter(p => p.name.toLowerCase().includes(val));
                document.getElementById('listTitle').innerText = "REZULTATET";
                results.innerHTML = filtered.map(p => `
                    <div class="result-item">
                        <img src="${p.photoUrl}" onclick="event.stopPropagation(); openFullScreen('${p.photoUrl}')">
                        <div onclick="openProfile('${p.id}')"><b>${p.name}</b></div>
                    </div>
                `).join('');
                container.style.display = 'block';
            } else { container.style.display = 'none'; }
        };

        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.closeProfile = () => document.getElementById('playerProfile').style.display = 'none';
    </script>
</body>
</html>
