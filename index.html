<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMP FUTBOLL | Elite Experience</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --white: #ffffff;
            --overlay: rgba(0, 0, 0, 0.75);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; }

        body {
            /* SFONDI REALIST I FUSHËS */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1556056504-5c7696c4c28d?q=80&w=2076&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* TOPI REALIST QË LËVIZ ME ANIMACION */
        .ball-realistic {
            position: absolute;
            width: 100px;
            height: 100px;
            background: url('https://img.freepik.com/free-photo/soccer-ball-green-grass_1150-14605.jpg?t=st=1711128000~exp=1711131600~hmac=8b2d...') center/cover;
            background: url('https://cdn-icons-png.flaticon.com/512/3311/3311571.png') center/cover; /* Icone kualitative */
            filter: drop-shadow(0 20px 10px rgba(0,0,0,0.5));
            z-index: 1;
            animation: moveBall 12s infinite linear;
            opacity: 0.9;
        }

        @keyframes moveBall {
            0% { transform: translate(-150%, -150%) rotate(0deg); }
            50% { transform: translate(150%, 150%) rotate(360deg); }
            100% { transform: translate(-150%, -150%) rotate(720deg); }
        }

        /* CARD-I KRYESOR */
        .main-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* RRJETA E GOLIT REALISTE */
        .goal-net {
            width: 160px;
            height: 60px;
            margin: 0 auto 20px;
            background: url('https://www.transparentpng.com/download/football-goal/football-goal-free-download-transparent-3.png') center/contain no-repeat;
            filter: brightness(0) invert(1); /* E bën të bardhë */
            opacity: 0.8;
        }

        h1 { color: var(--gold); font-size: 32px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: 2px; }
        .match-label { color: white; font-size: 11px; letter-spacing: 5px; margin-bottom: 30px; opacity: 0.6; }

        /* INPUT SI "TACTICAL BOARD" */
        .input-wrap { margin-bottom: 25px; }
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2);
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-size: 22px;
            text-align: center;
            font-weight: 900;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }

        /* BUTTONAT E LOJËS */
        .btn-action {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-gold { background: var(--gold); color: black; box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3); }
        .btn-gold:hover { transform: translateY(-3px); background: #fff; }

        .btn-yes { background: #2ecc71; color: white; }
        .btn-no { background: #e74c3c; color: white; }

        /* LISTA E LOJTARËVE */
        .squad-container {
            margin-top: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .player-row {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: 700;
        }

        .status-tag {
            background: var(--gold);
            color: black;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 900;
            margin-bottom: 10px;
            display: inline-block;
        }

        #step-confirm, #step-list { display: none; }
    </style>
</head>
<body>

<div class="ball-realistic"></div>

<div class="main-card">
    <div class="goal-net"></div>
    
    <div id="step-check">
        <h1>RAMP FUTBOLL</h1>
        <div class="match-label">MATCH CENTER</div>
        
        <div class="input-wrap">
            <input type="text" id="pID" placeholder="ID E LOJTARIT" inputmode="numeric">
        </div>
        
        <button class="btn-action btn-gold" onclick="kontrolloID()">
            HYR NË FUSHË <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <div id="step-confirm">
        <h2 id="userName" style="color:white; font-size: 26px; margin-bottom: 10px;">...</h2>
        <div class="status-tag" id="userStatus">DUKE ANALIZUAR...</div>
        
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; color: white; margin-bottom: 20px; font-size: 14px; border-left: 4px solid var(--gold);">
            <div id="matchData"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="btn-action btn-yes" onclick="ekzekutoKonfirmimin(true)">VIJ ✅</button>
            <button class="btn-action btn-no" onclick="ekzekutoKonfirmimin(false)">JO ❌</button>
        </div>
    </div>

    <div id="step-list">
        <h3 id="finalMsg" style="color:var(--gold); font-size: 20px; margin-bottom: 5px;"></h3>
        <p id="matchInfoSmall" style="color: white; opacity: 0.5; font-size: 12px; margin-bottom: 20px;"></p>
        
        <div class="squad-container" id="finalList"></div>

        <button class="btn-action" style="background:transparent; color:white; border: 1px solid rgba(255,255,255,0.2); margin-top: 20px;" onclick="location.reload()">
            MBYLL <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lojtari = null;
    let matchID = "";

    async function kontrolloID() {
        const id = document.getElementById('pID').value.trim();
        if(!id) return;

        const mainDoc = await db.collection("config").doc("main").get();
        const staffDoc = await db.collection("config").doc("staff").get();
        if(!mainDoc.exists) return;

        const d = mainDoc.data();
        const p = staffDoc.data().lojtaret.find(x => x.id === id);

        if(!p) return alert("ID e gabuar!");

        lojtari = p;
        matchID = `match_${d.data.replace(/\./g, '-')}_${d.ora.replace(/:/g, '-')}`;

        const currentMatch = await db.collection("matches").doc(matchID).get();
        let list = currentMatch.exists ? currentMatch.data().pjesemarresit : [];
        const konfirmimi = list.find(x => x.id === id);

        if(konfirmimi) {
            document.getElementById('finalMsg').innerText = konfirmimi.vjen ? "LOJTAR I KONFIRMUAR ⚡" : "NJOFTIMI U PRANUA ❌";
            shfaqListen(list);
            switchStep('step-check', 'step-list');
        } else {
            document.getElementById('userName').innerText = p.n;
            document.getElementById('matchData').innerHTML = `📍 ${d.vendi}<br>📅 ${d.data} | ⏰ ${d.ora}`;
            
            const idx = parseInt(d.data.split('.')[0]) - 1;
            const status = (p.s && p.s[idx]) ? p.s[idx].toUpperCase() : "OFF";
            document.getElementById('userStatus').innerText = "ORARI: " + status;

            switchStep('step-check', 'step-confirm');
        }
    }

    async function ekzekutoKonfirmimin(vjen) {
        const ref = db.collection("matches").doc(matchID);
        const doc = await ref.get();
        let list = doc.exists ? doc.data().pjesemarresit : [];
        list = list.filter(x => x.id !== lojtari.id);
        list.push({ n: lojtari.n, id: lojtari.id, vjen: vjen });
        await ref.set({ pjesemarresit: list });
        shfaqListen(list);
        document.getElementById('finalMsg').innerText = vjen ? "JE NË FORMACION! ⚽" : "REGJISTRUAR! ❌";
        switchStep('step-confirm', 'step-list');
    }

    function shfaqListen(lista) {
        const div = document.getElementById('finalList');
        div.innerHTML = "";
        const vijne = lista.filter(x => x.vjen === true);
        vijne.forEach((p, i) => {
            div.innerHTML += `<div class="player-row"><span>${i+1}. ${p.n}</span> <i class="fas fa-check-circle" style="color:#2ecc71"></i></div>`;
        });
    }

    function switchStep(oldS, newS) {
        document.getElementById(oldS).style.display = "none";
        document.getElementById(newS).style.display = "block";
    }
</script>
</body>
</html>
