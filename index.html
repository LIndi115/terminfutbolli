<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINI FUTBOLL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-lime: #adff2f;
            --stadium-blue: #0a192f;
            --white: #ffffff;
            --danger: #ff4444;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Barlow Condensed', sans-serif;
            background: var(--stadium-blue);
            color: var(--white);
            overflow: hidden;
        }

        .stadium-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(10, 25, 47, 0.85), rgba(10, 25, 47, 0.95)), 
                        url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1920');
            background-size: cover; background-position: center;
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px; text-align: center;
        }

        .main-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(45px, 12vw, 90px);
            line-height: 0.85; text-transform: uppercase;
            margin-bottom: 30px; font-style: italic;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px 30px; width: 100%; max-width: 400px;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        input {
            width: 100%; background: transparent; border: 3px solid var(--white);
            padding: 18px; color: white; font-size: 26px; font-weight: 900;
            text-align: center; font-family: 'Barlow Condensed';
            margin-bottom: 25px; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--neon-lime); box-shadow: 0 0 20px rgba(173, 255, 47, 0.3); }

        .btn-sport {
            width: 100%; background: var(--white); color: black;
            border: none; padding: 20px; font-weight: 900; font-size: 22px;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            clip-path: polygon(4% 0, 100% 0, 96% 100%, 0 100%);
        }

        .btn-sport:hover { background: var(--neon-lime); transform: scale(1.03); }

        #status-area { display: none; margin-top: 10px; }
        .status-badge {
            font-size: 32px; font-weight: 900; padding: 15px;
            text-transform: uppercase; margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Footer info eshte bere hidden (e fshehur) */
        .footer-info {
            display: none;
        }
    </style>
</head>
<body>

    <div class="stadium-bg"></div>

    <div class="container">
        <h1 class="main-title" id="ui-titulli">TERMINI<br>FUTBOLL</h1>

        <div class="player-card">
            <div id="entry-form">
                <input type="text" id="idInput" placeholder="SHKRUAJ ID TUAJ">
                <button class="btn-sport" onclick="checkPlayer()">KONTROLLO STATUSIN</button>
            </div>

            <div id="status-area">
                <div id="status-text" class="status-badge"></div>
                <button id="confirm-btn" class="btn-sport" style="background: var(--neon-lime); display: none;" onclick="finalConfirm()">KONFIRMO PJESËMARRJEN</button>
                <button class="btn-sport" style="margin-top: 15px; font-size: 14px; background: #222; color: white;" onclick="location.reload()">KTHEHU</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let player = null;
    let settings = {};

    // Marrim vetem titullin, tjerat i bllokojme
    db.collection("config").doc("main").onSnapshot(doc => {
        if(doc.exists) {
            settings = doc.data();
            // Nese ka titull te ri ne Firebase e merr, perndryshe mbetet "TERMINI FUTBOLL"
            if(settings.titulli) {
                document.getElementById('ui-titulli').innerHTML = settings.titulli.replace(" ", "<br>");
            }
        }
    });

    async function checkPlayer() {
        const id = document.getElementById('idInput').value;
        const statusArea = document.getElementById('status-area');
        const entryForm = document.getElementById('entry-form');
        const statusText = document.getElementById('status-text');
        const confBtn = document.getElementById('confirm-btn');

        if(!id) return;

        const doc = await db.collection("config").doc("staff").get();
        const found = doc.data().lojtaret.find(p => p.id === id);

        entryForm.style.display = "none";
        statusArea.style.display = "block";

        if(!found) {
            statusText.innerText = "ID E GABUAR";
            statusText.style.color = "var(--danger)";
            return;
        }

        player = found;
        // Supozojme diten e pare nese nuk ka date ne Firebase
        const dita = parseInt(settings.data) || 1; 
        const shift = player.s[dita-1] || "OFF";

        if(shift.includes("16")) {
            statusText.innerText = `⚠️ ${player.n}, JE NË PUNË!`;
            statusText.style.color = "var(--danger)";
        } else {
            statusText.innerText = `✅ ${player.n}, JE I LIRË!`;
            statusText.style.color = "var(--neon-lime)";
            confBtn.style.display = "block";
        }
    }

    function finalConfirm() {
        db.collection("terminet").doc(player.n).set({
            emri: player.n,
            koha: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("U REGJISTRUA ME SUKSES!");
            location.reload();
        });
    }
</script>
</body>
</html>
