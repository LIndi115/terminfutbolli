<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAMP Match Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ramp-yellow: #ffcc00;
            --green: #39ff14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; }

        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* KY ESHTE SEKSIONI QE RREGULLON SFONDIN SI NE PC */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                              url('https://images.unsplash.com/photo-1551958219-acbc608c6377?q=80&w=2070&auto=format&fit=crop');
            background-repeat: no-repeat;
            background-position: center center;
            /* Ne PC rri cover, ne TEL e detyrojme te rrije si ne PC */
            background-size: cover;
            z-index: 1;
        }

        @media (max-width: 600px) {
            body::before {
                /* Ketu eshte magjia: e rritim pak madhesine e fotos ne tel 
                   qe topat te vijne me ne mes, por pa e humbur kualitetin */
                background-size: 250% auto !important; 
            }
        }

        .ramp-card {
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 360px;
            padding: 40px 25px;
            border-radius: 25px;
            border: 1px solid rgba(255,204,0,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,1);
            text-align: center;
            position: relative;
            z-index: 10; /* Qe te jete permbi sfondin */
        }

        h1 { color: var(--ramp-yellow); font-size: 28px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
        .sub-txt { color: white; font-size: 10px; letter-spacing: 5px; margin-bottom: 30px; opacity: 0.6; text-transform: uppercase; }

        .p-input {
            width: 100%; background: #000; border: 2px solid #333; padding: 16px;
            border-radius: 12px; color: white; font-size: 18px; text-align: center;
            outline: none; margin-bottom: 15px;
        }
        .p-input:focus { border-color: var(--ramp-yellow); }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin-bottom: 12px; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-yellow { background: var(--ramp-yellow); color: black; }
        .btn-green { background: var(--green); color: black; }
        .btn-red { background: #ff4d4d; color: white; }

        .info-panel { background: rgba(255, 204, 0, 0.05); border: 1px solid rgba(255, 204, 0, 0.2); padding: 15px; border-radius: 15px; margin: 15px 0; color: white; text-align: left; font-size: 14px; }
        .player-row { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; color: white; border-left: 4px solid var(--green); }
        
        #step-confirm, #step-list { display: none; }
    </style>
</head>
<body>

<div class="ramp-card">
    <div id="step-check">
        <div style="font-size: 40px; color: var(--ramp-yellow); margin-bottom: 15px;"><i class="fas fa-id-card"></i></div>
        <h1>RAMP FUTBOLL</h1>
        <div class="sub-txt">Match Center</div>
        <input type="text" id="pID" class="p-input" placeholder="Shkruaj ID..." inputmode="numeric">
        <button class="btn btn-yellow" onclick="kontrolloID()">IDENTIFIKOHU <i class="fas fa-arrow-right"></i></button>
    </div>

    <div id="step-confirm">
        <h2 id="userName" style="color:var(--ramp-yellow); font-style: italic; margin-bottom: 10px;">...</h2>
        <div class="info-panel" id="matchData"></div>
        <button class="btn btn-green" onclick="ekzekutoKonfirmimin(true)">PO, VIJ ✅</button>
        <button class="btn btn-red" onclick="ekzekutoKonfirmimin(false)">JO ❌</button>
    </div>

    <div id="step-list">
        <h3 id="finalMsg" style="color: var(--ramp-yellow); margin-bottom: 15px;"></h3>
        <div class="squad-list" id="finalList" style="max-height: 250px; overflow-y: auto;"></div>
        <button class="btn btn-yellow" style="margin-top:20px; background:none; border:1px solid #444; color:white;" onclick="location.reload()">DIL</button>
    </div>
</div>

<script>
    // KONFIGURIMI FIREBASE (I NJEJTË)
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lojtari = null;
    let matchID = "";

    async function kontrolloID() {
        const id = document.getElementById('pID').value.trim();
        if(!id) return;
        const mainDoc = await db.collection("config").doc("main").get();
        const staffDoc = await db.collection("config").doc("staff").get();
        const d = mainDoc.data();
        const p = staffDoc.data().lojtaret.find(x => x.id === id);
        if(!p) return alert("ID e gabuar!");
        lojtari = p;
        const cleanVendi = d.vendi.replace(/\s+/g, '-').toLowerCase();
        matchID = `match_${d.data.replace(/\./g, '-')}_${d.ora.replace(/:/g, '-')}_${cleanVendi}`;
        const currentMatch = await db.collection("matches").doc(matchID).get();
        let list = currentMatch.exists ? currentMatch.data().pjesemarresit : [];
        const konfirmimi = list.find(x => x.id === id);
        if(konfirmimi) {
            document.getElementById('finalMsg').innerText = "STATUSI: U RUJT!";
            shfaqListen(list);
            switchStep('step-list');
        } else {
            document.getElementById('userName').innerText = p.n;
            document.getElementById('matchData').innerHTML = `📍 ${d.vendi}<br>📅 ${d.data} | Ora: ${d.ora}`;
            switchStep('step-confirm');
        }
    }

    async function ekzekutoKonfirmimin(vjen) {
        const ref = db.collection("matches").doc(matchID);
        const doc = await ref.get();
        let list = doc.exists ? doc.data().pjesemarresit : [];
        list = list.filter(x => x.id !== lojtari.id);
        list.push({ n: lojtari.n, id: lojtari.id, vjen: vjen });
        await ref.set({ pjesemarresit: list });
        shfaqListen(list);
        document.getElementById('finalMsg').innerText = vjen ? "U KONFIRMOVE! ✅" : "NUK VIEN! ❌";
        switchStep('step-list');
    }

    function shfaqListen(lista) {
        const div = document.getElementById('finalList');
        div.innerHTML = "";
        lista.filter(x => x.vjen).forEach((p, i) => {
            div.innerHTML += `<div class="player-row"><span>${i+1}. ${p.n}</span><i class="fas fa-check-circle" style="color:var(--green)"></i></div>`;
        });
    }

    function switchStep(stepId) {
        document.getElementById('step-check').style.display = "none";
        document.getElementById('step-confirm').style.display = "none";
        document.getElementById('step-list').style.display = "none";
        document.getElementById(stepId).style.display = "block";
    }
</script>
</body>
</html>
