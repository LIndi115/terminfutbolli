<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAMP FUTBOLL | Match Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --green: #39ff14;
            --red: #ff4d4d;
            --dark-card: rgba(15, 15, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* SFONDI I FUSHËS QË DUKET NJËJTË PC/TEL */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1556056504-5c7696c4c28d?q=80&w=2076&auto=format&fit=crop');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: -1;
        }

        @media (max-width: 600px) {
            body::before { background-size: contain; background-position: center 20%; }
        }

        /* ANIMACIONI I TOPIT */
        .ball-realistic {
            position: absolute;
            width: 80px; height: 80px;
            background: url('https://cdn-icons-png.flaticon.com/512/3311/3311571.png') center/cover;
            filter: drop-shadow(0 20px 10px rgba(0,0,0,0.5));
            z-index: 1;
            animation: moveBall 15s infinite linear;
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes moveBall {
            0% { transform: translate(-200%, -200%) rotate(0deg); }
            50% { transform: translate(200%, 200%) rotate(360deg); }
            100% { transform: translate(-200%, -200%) rotate(720deg); }
        }

        /* KARTA KRYESORE */
        .main-card {
            background: var(--dark-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 420px;
            padding: 40px 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            text-align: center;
            z-index: 10;
        }

        .goal-icon { font-size: 40px; color: var(--gold); margin-bottom: 10px; }
        h1 { color: var(--gold); font-size: 26px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: 1px; margin-bottom: 5px; }
        .match-label { color: white; font-size: 10px; letter-spacing: 4px; margin-bottom: 25px; opacity: 0.6; }

        input {
            width: 100%; background: rgba(255,255,255,0.05); border: 2px solid #333; padding: 18px;
            border-radius: 15px; color: white; font-size: 22px; text-align: center; font-weight: 900;
            outline: none; margin-bottom: 20px; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.1); }

        .btn {
            width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-size: 14px; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.2s;
        }
        .btn-gold { background: var(--gold); color: black; }
        .btn-yes { background: #2ecc71; color: white; flex: 1; }
        .btn-no { background: #e74c3c; color: white; flex: 1; }
        .btn:active { transform: scale(0.96); }

        .info-box { background: rgba(255, 204, 0, 0.05); border-left: 4px solid var(--gold); padding: 15px; border-radius: 10px; margin: 20px 0; text-align: left; color: white; font-size: 14px; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 5px; font-size: 11px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }

        .player-item {
            background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 10px;
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--green); color: white; font-size: 15px;
        }

        #step-confirm, #step-list { display: none; }
        .list-container { max-height: 280px; overflow-y: auto; margin-top: 15px; }
    </style>
</head>
<body>

<div class="ball-realistic"></div>

<div class="main-card">
    <div id="step-check">
        <div class="goal-icon"><i class="fas fa-id-card"></i></div>
        <h1>RAMP FUTBOLL</h1>
        <div class="match-label">MATCH CENTER</div>
        <input type="text" id="pID" placeholder="ID E LOJTARIT" inputmode="numeric">
        <button class="btn btn-gold" onclick="kontrolloID()">IDENTIFIKOHU <i class="fas fa-chevron-right"></i></button>
    </div>

    <div id="step-confirm">
        <h2 id="userName" style="color:white; margin-bottom: 5px;">...</h2>
        <div id="statusResult"></div>
        <div class="info-box" id="matchData">Duke ngarkuar...</div>
        <p style="color: #888; font-size: 12px; margin-bottom: 15px;">A vjen në këtë termin?</p>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-yes" onclick="ekzekutoKonfirmimin(true)">PO, VIJ ✅</button>
            <button class="btn btn-no" onclick="ekzekutoKonfirmimin(false)">JO ❌</button>
        </div>
    </div>

    <div id="step-list">
        <h3 id="finalMsg" style="margin-bottom: 5px;"></h3>
        <p id="matchInfoSmall" style="font-size:12px; color:var(--gold); border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:15px;"></p>
        <div class="list-container" id="finalList"></div>
        <button class="btn" style="background:none; color:white; border:1px solid #444; margin-top:20px;" onclick="location.reload()">DIL <i class="fas fa-sign-out-alt"></i></button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lojtari = null;
    let matchID = "";

    async function kontrolloID() {
        const id = document.getElementById('pID').value.trim();
        if(!id) return;

        const mainDoc = await db.collection("config").doc("main").get();
        const staffDoc = await db.collection("config").doc("staff").get();
        if(!mainDoc.exists || !staffDoc.exists) return alert("Sistemi nuk është gati!");

        const d = mainDoc.data();
        const lojtaret = staffDoc.data().lojtaret;
        const p = lojtaret.find(x => x.id === id);

        if(!p) return alert("ID e gabuar!");
        lojtari = p;

        // LOGJIKA E ID UNIK (E marrë nga kodi yt i fundit)
        const cleanVendi = d.vendi.replace(/\s+/g, '-').toLowerCase();
        const cleanOra = d.ora.replace(/:/g, '-');
        matchID = `match_${d.data.replace(/\./g, '-')}_${cleanOra}_${cleanVendi}`;

        const currentMatch = await db.collection("matches").doc(matchID).get();
        let list = currentMatch.exists ? currentMatch.data().pjesemarresit : [];
        const konfirmimiEkzistues = list.find(x => x.id === id);

        if(konfirmimiEkzistues) {
            document.getElementById('finalMsg').innerHTML = konfirmimiEkzistues.vjen ? 
                "<span style='color:var(--green)'>U KONFIRMOVE! ✅</span>" : 
                "<span style='color:var(--red)'>NUK VIEN! ❌</span>";
            document.getElementById('matchInfoSmall').innerHTML = `<b>${d.titulli}</b><br>${d.vendi} | ${d.data}`;
            shfaqListen(list);
            switchStep('step-check', 'step-list');
        } else {
            document.getElementById('userName').innerText = p.n;
            document.getElementById('matchData').innerHTML = `<b>${d.titulli}</b><br>📍 ${d.vendi}<br>📅 ${d.data} | Ora: ${d.ora}`;
            
            // LOGJIKA E ORARIT (8, 16, OFF)
            const indexData = parseInt(d.data.split('.')[0]) - 1;
            const orari = (p.s && p.s[indexData]) ? p.s[indexData].toUpperCase() : "OFF";
            const resDiv = document.getElementById('statusResult');

            if(orari === "16") {
                resDiv.innerHTML = `<div class="status-badge" style="background:rgba(255,77,77,0.2); color:var(--red)">ORARI: MASDITE (16:00) ❌</div>`;
            } else {
                let t = (orari === "OFF") ? "PUSHIM" : (orari === "8") ? "PARADITE (08:00)" : orari;
                resDiv.innerHTML = `<div class="status-badge" style="background:rgba(57,255,20,0.2); color:var(--green)">ORARI: ${t} ✅</div>`;
            }

            switchStep('step-check', 'step-confirm');
        }
    }

    async function ekzekutoKonfirmimin(vjen) {
        const ref = db.collection("matches").doc(matchID);
        const doc = await ref.get();
        let list = doc.exists ? doc.data().pjesemarresit : [];

        list = list.filter(x => x.id !== lojtari.id); // Parandalon dublikatet
        list.push({ n: lojtari.n, id: lojtari.id, vjen: vjen });
        
        await ref.set({ pjesemarresit: list });

        document.getElementById('finalMsg').innerHTML = vjen ? 
            "<span style='color:var(--green)'>JE NË FORMACION! ⚽</span>" : 
            "<span style='color:var(--red)'>REGJISTRUAR! ❌</span>";

        shfaqListen(list);
        switchStep('step-confirm', 'step-list');
    }

    function shfaqListen(lista) {
        const div = document.getElementById('finalList');
        div.innerHTML = "";
        const vijne = lista.filter(x => x.vjen === true);
        
        if(vijne.length === 0) {
            div.innerHTML = "<p style='color:#555; font-size:13px;'>Asnjë lojtar deri tani.</p>";
            return;
        }

        vijne.forEach((p, i) => {
            div.innerHTML += `
                <div class="player-item">
                    <span><b>${i+1}.</b> ${p.n}</span> 
                    <i class="fas fa-check-circle" style="color:var(--green)"></i>
                </div>`;
        });
    }

    function switchStep(oldS, newS) {
        document.getElementById(oldS).style.display = "none";
        document.getElementById(newS).style.display = "block";
    }
</script>
</body>
</html>
