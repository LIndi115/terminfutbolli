<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKIA Football Match</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f111a; color: white; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        .card { background: #1a1d29; max-width: 450px; margin: auto; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .match-info { border: 1px solid #00d2ff; padding: 15px; border-radius: 12px; margin: 15px 0; background: rgba(0,210,255,0.05); text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 10px; text-align: center; font-size: 18px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-check { background: #00d2ff; color: black; }
        .btn-konfirmo { background: #39ff14; color: black; display: none; margin-top: 15px; }
        .status-msg { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .pjesemarresit { margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
        .p-item { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid #39ff14; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:#00d2ff">LKIA MATCH CENTER</h2>
    <div id="mDetails" class="match-info">Duke ngarkuar...</div>

    <input type="text" id="pID" placeholder="Shkruaj ID tënde (Telefonin)">
    <button class="btn btn-check" onclick="kycu()">KONTROLLO ORARIN TIM</button>

    <div id="sMsg" class="status-msg"></div>
    <button id="btnK" class="btn btn-konfirmo" onclick="konfirmo()">KONFIRMO PJESËMARRJEN ✅</button>

    <div class="pjesemarresit">
        <h4><i class="fas fa-list"></i> Lista e Konfirmuar:</h4>
        <div id="lista"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let dataN = ""; 
    let lAktual = null;

    async function init() {
        const doc = await db.collection("config").doc("main").get();
        if(doc.exists) {
            const d = doc.data();
            dataN = d.data;
            document.getElementById('mDetails').innerHTML = `<strong>${d.titulli}</strong><br>${d.vendi}<br>📅 ${d.dita}, ${d.data} | ⏰ ${d.ora}`;
        }
        shfaqListen();
    }

    async function kycu() {
        const id = document.getElementById('pID').value;
        const staff = await db.collection("config").doc("staff").get();
        const p = staff.data().lojtaret.find(x => x.id === id);

        if(!p) return alert("ID nuk ekziston!");
        lAktual = p;

        const dita = parseInt(dataN.split('.')[0]); // Merr diten psh 25
        const orari = p.s[dita-1]; // Shikon orarin te kolona 25

        const sMsg = document.getElementById('sMsg');
        const btnK = document.getElementById('btnK');
        sMsg.style.display = "block";

        if(orari === "16") {
            sMsg.innerHTML = `Përshëndetje ${p.n}, je MASDITE (16-00). Je në punë! ❌`;
            sMsg.style.background = "rgba(255,0,0,0.2)";
            btnK.style.display = "none";
        } else {
            let t = (orari === "OFF") ? "PUSHIM" : (orari === "8") ? "PARADITE" : orari;
            sMsg.innerHTML = `Përshëndetje ${p.n}, je ${t}. Mund të vish! ✅`;
            sMsg.style.background = "rgba(0,255,0,0.2)";
            btnK.style.display = "block";
        }
    }

    async function konfirmo() {
        const ref = db.collection("matches").doc("current");
        const doc = await ref.get();
        let list = doc.exists ? doc.data().pjesemarresit : [];
        if(!list.find(x => x.id === lAktual.id)) {
            list.push({ n: lAktual.n, id: lAktual.id });
            await ref.set({ pjesemarresit: list });
            alert("U konfirmove!");
            shfaqListen();
        } else { alert("Je në listë!"); }
    }

    async function shfaqListen() {
        const doc = await db.collection("matches").doc("current").get();
        const div = document.getElementById('lista');
        div.innerHTML = "";
        if(doc.exists) {
            doc.data().pjesemarresit.forEach((p, i) => {
                div.innerHTML += `<div class="p-item"><span>${i+1}. ${p.n}</span> <i class="fas fa-check-circle"></i></div>`;
            });
        }
    }
    init();
</script>
</body>
</html>
