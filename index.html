<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAMP Match Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ramp-yellow: #ffcc00;
            --red: #ff4d4d;
            --green: #39ff14;
            --dark-card: rgba(15, 15, 15, 0.97);
        }

        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            /* SFONDI QË NUK LEJON KOPITJEN E TOPAVE */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                              url('https://images.unsplash.com/photo-1551958219-acbc608c6377?q=80&w=2070&auto=format&fit=crop');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* Default per PC */
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* RREGULLIMI KRYESOR PËR TELEFON (QË TË DOKET SI NË PC) */
        @media (max-width: 768px) {
            body {
                /* Kjo e bën foton të mos pritet anash në ekranet e ngushtë */
                background-size: auto 100%; 
            }
            .ramp-card {
                width: 85% !important; /* Karta nuk ngjitet ne skaje, shihen topat */
                max-width: 340px !important;
                padding: 30px 20px !important;
            }
            h1 { font-size: 24px !important; }
        }

        .ramp-card {
            background: var(--dark-card);
            backdrop-filter: blur(15px);
            width: 92%;
            max-width: 380px;
            padding: 40px 25px;
            border-radius: 25px;
            border: 1px solid rgba(255,204,0,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            text-align: center;
            z-index: 10;
        }

        h1 { color: var(--ramp-yellow); font-size: 30px; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 5px; }
        .sub-txt { color: white; font-size: 10px; letter-spacing: 5px; margin-bottom: 30px; opacity: 0.6; text-transform: uppercase; }

        .p-input {
            width: 100%; background: #000; border: 2px solid #333; padding: 16px;
            border-radius: 12px; color: white; font-size: 18px; text-align: center;
            outline: none; margin-bottom: 15px; transition: 0.3s;
        }
        .p-input:focus { border-color: var(--ramp-yellow); }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin-bottom: 12px; transition: 0.2s; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-yellow { background: var(--ramp-yellow); color: black; }
        .btn-green { background: var(--green); color: black; }
        .btn-red { background: var(--red); color: white; }
        .btn:active { transform: scale(0.96); }

        .info-panel { background: rgba(255, 204, 0, 0.05); border: 1px solid rgba(255, 204, 0, 0.2); padding: 15px; border-radius: 15px; margin: 15px 0; color: white; text-align: left; font-size: 14px; line-height: 1.6; }
        .status-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 900; margin-bottom: 12px; }

        .squad-list { margin-top: 15px; max-height: 250px; overflow-y: auto; text-align: left; }
        .player-row {
            background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 10px;
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--green); color: white;
        }

        #step-confirm, #step-list { display: none; }

        /* Scrollbar për listën */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--ramp-yellow); border-radius: 10px; }
    </style>
</head>
<body>

<div class="ramp-card">
    <div id="step-check">
        <div style="font-size: 40px; color: var(--ramp-yellow); margin-bottom: 15px;"><i class="fas fa-id-card"></i></div>
        <h1>RAMP FUTBOLL</h1>
        <div class="sub-txt">Match Center</div>
        <p style="color: #888; font-size: 13px; margin-bottom: 20px;">Shëno ID-në tënde për të hyrë</p>
        <input type="text" id="pID" class="p-input" placeholder="Shkruaj ID..." inputmode="numeric">
        <button class="btn btn-yellow" onclick="kontrolloID()">IDENTIFIKOHU <i class="fas fa-arrow-right"></i></button>
    </div>

    <div id="step-confirm">
        <h2 id="userName" style="color:var(--ramp-yellow); margin-bottom: 10px; font-style: italic;">...</h2>
        <div class="info-panel" id="matchData">Duke ngarkuar...</div>
        <div id="statusResult"></div>
        <p style="color:#888; font-size: 12px; margin-bottom: 15px;">A vjen në këtë termin?</p>
        <button class="btn btn-green" onclick="ekzekutoKonfirmimin(true)">PO, VIJ ✅</button>
        <button class="btn btn-red" onclick="ekzekutoKonfirmimin(false)">JO, NUK MUNDEM ❌</button>
    </div>

    <div id="step-list">
        <h3 id="finalMsg" style="margin-bottom: 5px;"></h3>
        <p id="matchInfoSmall" style="font-size:12px; color:var(--ramp-yellow); margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px; opacity: 0.8;"></p>
        <div class="squad-list" id="finalList"></div>
        <button class="btn btn-yellow" style="margin-top:20px; background:none; border:1px solid #444; color:white;" onclick="location.reload()">DIL <i class="fas fa-sign-out-alt"></i></button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lojtari = null;
    let matchID = "";
    let matchDetailsHTML = "";

    async function kontrolloID() {
        const id = document.getElementById('pID').value.trim();
        if(!id) return;

        const mainDoc = await db.collection("config").doc("main").get();
        const staffDoc = await db.collection("config").doc("staff").get();
        if(!mainDoc.exists || !staffDoc.exists) return alert("Sistemi nuk është gati!");

        const d = mainDoc.data();
        const p = staffDoc.data().lojtaret.find(x => x.id === id);

        if(!p) return alert("ID e gabuar! Provo përsëri.");

        lojtari = p;
        const cleanVendi = d.vendi.replace(/\s+/g, '-').toLowerCase();
        const cleanOra = d.ora.replace(/:/g, '-');
        matchID = `match_${d.data.replace(/\./g, '-')}_${cleanOra}_${cleanVendi}`;

        matchDetailsHTML = `<b>${d.titulli || 'NDESHJA'}</b><br>📍 ${d.vendi}<br>📅 ${d.data} | Ora: ${d.ora}`;
        document.getElementById('matchInfoSmall').innerHTML = matchDetailsHTML;

        const currentMatch = await db.collection("matches").doc(matchID).get();
        let list = currentMatch.exists ? currentMatch.data().pjesemarresit : [];
        const konfirmimiEkzistues = list.find(x => x.id === id);

        if(konfirmimiEkzistues) {
            document.getElementById('finalMsg').innerHTML = konfirmimiEkzistues.vjen ? 
                "<span style='color:var(--green)'>Mirëseveprore, " + p.n + "! ✅</span>" : 
                "<span style='color:var(--red)'>Përshëndetje, " + p.n + "! ❌</span>";
            shfaqListen(list);
            switchStep('step-list');
        } else {
            document.getElementById('userName').innerText = p.n;
            document.getElementById('matchData').innerHTML = matchDetailsHTML;
            
            const indexData = parseInt(d.data.split('.')[0]) - 1;
            const orari = (p.s && p.s[indexData]) ? p.s[indexData].toUpperCase() : "OFF";
            const resDiv = document.getElementById('statusResult');

            if(orari === "16") {
                resDiv.innerHTML = `<div class="status-badge" style="background:rgba(255,77,77,0.2); color:var(--red)">JE MASDITE (16:00) ❌</div>`;
            } else {
                let t = (orari === "OFF") ? "JE PUSHIM" : (orari === "8") ? "JE PARADITE (08:00)" : "JE " + orari;
                resDiv.innerHTML = `<div class="status-badge" style="background:rgba(57,255,20,0.2); color:var(--green)">${t} ✅</div>`;
            }
            switchStep('step-confirm');
        }
    }

    async function ekzekutoKonfirmimin(vjen) {
        const ref = db.collection("matches").doc(matchID);
        const doc = await ref.get();
        let list = doc.exists ? doc.data().pjesemarresit : [];
        list = list.filter(x => x.id !== lojtari.id);
        list.push({ n: lojtari.n, id: lojtari.id, vjen: vjen });
        await ref.set({ pjesemarresit: list });
        document.getElementById('finalMsg').innerHTML = vjen ? 
            "<span style='color:var(--green)'>U konfirmove! ✅</span>" : 
            "<span style='color:var(--red)'>Njoftimi u dërgua! ❌</span>";
        shfaqListen(list);
        switchStep('step-list');
    }

    function shfaqListen(lista) {
        const div = document.getElementById('finalList');
        div.innerHTML = "";
        const vijne = lista.filter(x => x.vjen === true);
        if(vijne.length === 0) {
            div.innerHTML = "<p style='color:#555; text-align:center; font-size:13px;'>Asnjë konfirmim deri tani.</p>";
            return;
        }
        vijne.forEach((p, i) => {
            div.innerHTML += `<div class="player-row"><span><b>${i+1}.</b> ${p.n}</span><i class="fas fa-check-circle" style="color:var(--green)"></i></div>`;
        });
    }

    function switchStep(stepId) {
        document.getElementById('step-check').style.display = "none";
        document.getElementById('step-confirm').style.display = "none";
        document.getElementById('step-list').style.display = "none";
        document.getElementById(stepId).style.display = "block";
    }
</script>
</body>
</html>
