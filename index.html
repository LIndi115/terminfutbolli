<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKIA Football Match</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #00d2ff; --green: #39ff14; --dark: #0f111a; --card: #1a1d29; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }
        
        .card { background: var(--card); width: 100%; max-width: 400px; padding: 30px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; }
        
        /* Hapat e aplikacionit */
        #step-check, #step-confirm, #step-list { display: none; }
        #step-check { display: block; } /* Hapi i pare aktiv */

        .logo-icon { font-size: 50px; color: var(--blue); margin-bottom: 20px; }
        h2 { margin-bottom: 10px; font-size: 22px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        input { width: 100%; padding: 18px; background: #000; border: 2px solid #333; color: white; border-radius: 12px; font-size: 20px; text-align: center; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; font-size: 14px; }
        .btn-blue { background: var(--blue); color: black; }
        .btn-green { background: var(--green); color: black; }
        .btn:active { transform: scale(0.96); }

        .info-box { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--blue); padding: 15px; border-radius: 15px; margin: 20px 0; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 10px; }

        .p-item { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--green); text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <div id="step-check">
        <div class="logo-icon"><i class="fas fa-user-shield"></i></div>
        <h2>LKIA Match Center</h2>
        <p>Shëno ID-në tënde për të vazhduar</p>
        <input type="text" id="pID" placeholder="Shkruaj ID këtu..." inputmode="numeric">
        <button class="btn btn-blue" onclick="kontrolloID()">IDENTIFIKOHU <i class="fas fa-arrow-right"></i></button>
    </div>

    <div id="step-confirm">
        <h2 id="userName" style="color:var(--blue)">...</h2>
        <div class="info-box" id="matchData">Duke ngarkuar...</div>
        <div id="statusResult"></div>
        <button id="btnConfirmAction" class="btn btn-green" onclick="konfirmoPjesemarrjen()">KONFIRMO PJESËMARRJEN ✅</button>
        <button class="btn" style="background:transparent; color:#555;" onclick="location.reload()">Anulo</button>
    </div>

    <div id="step-list">
        <h3 style="color:var(--green)"><i class="fas fa-check-circle"></i> U konfirmuat!</h3>
        <p>Lista e lojtarëve për këtë termin:</p>
        <div id="finalList" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>
        <button class="btn btn-blue" onclick="location.reload()">MBYLL <i class="fas fa-times"></i></button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lojtariAktual = null;
    let indexDataMatch = -1;

    // Kontrollo ID-ne
    async function kontrolloID() {
        const id = document.getElementById('pID').value.trim();
        if(!id) return;

        // Merr te dhenat e ndeshjes dhe staffit
        const mainDoc = await db.collection("config").doc("main").get();
        const staffDoc = await db.collection("config").doc("staff").get();

        if(!mainDoc.exists || !staffDoc.exists) return alert("Sistemi nuk eshte gati!");

        const d = mainDoc.data();
        const p = staffDoc.data().lojtaret.find(x => x.id === id);

        if(!p) return alert("Kjo ID nuk u gjet ne sistem!");

        lojtariAktual = p;

        // Kalkulo diten
        if(d.data) {
            indexDataMatch = parseInt(d.data.split('.')[0]) - 1;
        }

        // Shfaq detajet te Hapi 2
        document.getElementById('userName').innerText = "Përshëndetje " + p.n;
        document.getElementById('matchData').innerHTML = `
            <b style="color:white">${d.titulli}</b><br>
            <span style="font-size:13px">${d.vendi}</span><br>
            <span style="color:var(--blue)">${d.data} | Ora: ${d.ora}</span>
        `;

        const orariPunes = (p.s && p.s[indexDataMatch]) ? p.s[indexDataMatch].toUpperCase() : "OFF";
        const resultDiv = document.getElementById('statusResult');
        const btnC = document.getElementById('btnConfirmAction');

        if(orariPunes === "16") {
            resultDiv.innerHTML = `<div class="status-badge" style="background:rgba(255,0,0,0.2); color:#ff4d4d">JE MASDITE (16:00) - NUK MUND TË VISH ❌</div>`;
            btnC.style.display = "none";
        } else {
            let tekstOrari = (orariPunes === "OFF") ? "JE PUSHIM" : (orariPunes === "8") ? "JE PARADITE (08:00)" : "JE " + orariPunes;
            resultDiv.innerHTML = `<div class="status-badge" style="background:rgba(57,255,20,0.2); color:var(--green)">${tekstOrari} - MUND TË VISH ✅</div>`;
            btnC.style.display = "block";
        }

        // Kalimi ne Hapin 2
        document.getElementById('step-check').style.display = "none";
        document.getElementById('step-confirm').style.display = "block";
    }

    // Konfirmo
    async function konfirmoPjesemarrjen() {
        const ref = db.collection("matches").doc("current");
        const doc = await ref.get();
        let list = doc.exists ? doc.data().pjesemarresit : [];

        if(!list.find(x => x.id === lojtariAktual.id)) {
            list.push({ n: lojtariAktual.n, id: lojtariAktual.id });
            await ref.set({ pjesemarresit: list });
        }

        shfaqListenFinale(list);
        
        // Kalimi ne Hapin 3
        document.getElementById('step-confirm').style.display = "none";
        document.getElementById('step-list').style.display = "block";
    }

    function shfaqListenFinale(lista) {
        const div = document.getElementById('finalList');
        div.innerHTML = "";
        lista.forEach((p, i) => {
            div.innerHTML += `<div class="p-item"><span>${i+1}. ${p.n}</span> <i class="fas fa-check-circle" style="color:var(--green)"></i></div>`;
        });
    }
</script>
</body>
</html>
