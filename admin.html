<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSE Admin - LKIA Control 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #00d2ff; --green: #39ff14; --dark: #0f111a; --card: #1a1d29; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .admin-box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        h2 { color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .table-container { overflow-x: auto; border-radius: 10px; border: 1px solid #222; margin-top: 15px; position: relative; }
        table { width: 100%; border-collapse: collapse; min-width: 1500px; table-layout: fixed; }
        
        th, td { border: 1px solid #333; padding: 0; text-align: center; height: 35px; overflow: hidden; }
        
        .day-col { width: 38px; } 
        .name-cell { width: 180px; text-align: left; background: #111; position: sticky; left: 0; border-right: 2px solid var(--blue); z-index: 10; padding-left: 5px; }
        .id-cell { width: 85px; background: #0a0a0a; }

        .head-edit, .num-edit, .day-input { 
            width: 100%; height: 100%; border: none; text-align: center; 
            font-family: 'Arial Narrow', sans-serif; padding: 0; margin: 0; display: block; outline: none;
        }

        .head-edit { background: #111; color: #888; font-size: 11px; text-transform: uppercase; }
        .num-edit { background: var(--blue); color: black; font-weight: bold; font-size: 12px; }
        .day-input { background: transparent; color: white; font-weight: bold; font-size: 11px; }
        .day-input:focus { background: #222; color: var(--green); }

        .btn { padding: 14px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-update { background: var(--blue); color: black; width: 100%; }
        .btn-add { background: #8e44ad; color: white; margin-bottom: 15px; }
        .btn-save { background: var(--green); color: black; width: 100%; font-size: 15px; margin-top: 20px; letter-spacing: 0.5px; }
        .btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="admin-box">
    <h2><i class="fas fa-edit"></i> 1. Detajet e Terminit</h2>
    <div class="grid-inputs">
        <div><label>Ndeshja</label><input type="text" id="titulli"></div>
        <div><label>Stadiumi</label><input type="text" id="vendi"></div>
        <div><label>Data (DD.MM)</label><input type="text" id="data_terminit"></div>
        <div><label>Ora</label><input type="text" id="ora"></div>
    </div>
    <button class="btn btn-update" onclick="ruajDetajet()">PËRDITËSO TERMININ & STRUKTURËN</button>
</div>

<div class="admin-box">
    <h2><i class="fas fa-table"></i> 2. Orari (OFF, 8, 16, 00/08)</h2>
    <button class="btn btn-add" onclick="shtoRreshtTeRi()">+ SHTO LOJTAR</button>
    
    <div class="table-container">
        <table>
            <thead>
                <tr id="rowDays">
                    <th class="name-cell">Dita:</th>
                    <th class="id-cell">-</th>
                </tr>
                <tr id="rowNumbers">
                    <th class="name-cell">Data:</th>
                    <th class="id-cell" style="background:var(--blue); color:black;">ID</th>
                </tr>
            </thead>
            <tbody id="playerRows"></tbody>
        </table>
    </div>
    
    <button class="btn btn-save" onclick="ruajGjithcka()">PËRDITËSO SISTEMIN ME TË DHËNA ✅</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.onload = () => {
        krijoStrukturën();
        ngarkoTeDhenat();
    };

    function krijoStrukturën() {
        const rowDays = document.getElementById('rowDays');
        const rowNumbers = document.getElementById('rowNumbers');
        for (let i = 1; i <= 31; i++) {
            let thDay = document.createElement('th'); thDay.className = "day-col";
            thDay.innerHTML = `<input type="text" class="head-edit day-name" value="-" maxlength="3">`;
            rowDays.appendChild(thDay);
            let thNum = document.createElement('th'); thNum.className = "day-col";
            thNum.innerHTML = `<input type="text" class="num-edit day-num" value="${i}" maxlength="2">`;
            rowNumbers.appendChild(thNum);
        }
        rowDays.innerHTML += '<th style="width:45px"></th>';
        rowNumbers.innerHTML += '<th style="width:45px; background:red; color:white;"><i class="fas fa-trash-alt"></i></th>';
    }

    async function ngarkoTeDhenat() {
        const main = await db.collection("config").doc("main").get();
        if(main.exists) {
            const d = main.data();
            document.getElementById('titulli').value = d.titulli || "";
            document.getElementById('vendi').value = d.vendi || "";
            document.getElementById('data_terminit').value = d.data || "";
            document.getElementById('ora').value = d.ora || "";
            if(d.headerDays) {
                const daysInp = document.querySelectorAll('.day-name');
                d.headerDays.forEach((val, idx) => { if(daysInp[idx]) daysInp[idx].value = val; });
            }
            if(d.headerNums) {
                const numsInp = document.querySelectorAll('.day-num');
                d.headerNums.forEach((val, idx) => { if(numsInp[idx]) numsInp[idx].value = val; });
            }
        }
        const staff = await db.collection("config").doc("staff").get();
        if(staff.exists) staff.data().lojtaret.forEach(p => krijoRresht(p));
    }

    function krijoRresht(p = {}) {
        const tr = document.createElement('tr');
        tr.className = "player-row";
        let html = `
            <td class="name-cell"><input type="text" class="inp-n" value="${p.n || ''}" style="background:transparent;border:none;color:white;width:100%;height:100%;font-size:12px"></td>
            <td class="id-cell"><input type="text" class="inp-id" value="${p.id || ''}" style="background:transparent;border:none;color:#00d2ff;width:100%;text-align:center;font-size:11px"></td>
        `;
        for (let d = 0; d < 31; d++) {
            let val = (p.s && p.s[d]) ? p.s[d] : "OFF";
            html += `<td class="day-col"><input type="text" class="day-input" value="${val}"></td>`;
        }
        html += `<td><button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:red;cursor:pointer;width:100%"><i class="fas fa-times"></i></button></td>`;
        tr.innerHTML = html;
        document.getElementById('playerRows').appendChild(tr);
    }

    function shtoRreshtTeRi() { krijoRresht({ s: Array(31).fill("OFF") }); }

    async function ruajDetajet() {
        let hDays = []; let hNums = [];
        document.querySelectorAll('.day-name').forEach(el => hDays.push(el.value));
        document.querySelectorAll('.day-num').forEach(el => hNums.push(el.value));
        await db.collection("config").doc("main").set({
            titulli: document.getElementById('titulli').value,
            vendi: document.getElementById('vendi').value,
            data: document.getElementById('data_terminit').value,
            ora: document.getElementById('ora').value,
            headerDays: hDays, headerNums: hNums
        }, {merge: true});
        alert("✅ Struktura dhe termini u përditësuan!");
    }

    async function ruajGjithcka() {
        let lojtaret = [];
        document.querySelectorAll('.player-row').forEach(r => {
            let orari = [];
            r.querySelectorAll('.day-input').forEach(d => orari.push(d.value.toUpperCase()));
            lojtaret.push({ n: r.querySelector('.inp-n').value, id: r.querySelector('.inp-id').value, s: orari });
        });
        await db.collection("config").doc("staff").set({ lojtaret });
        alert("🚀 Të dhënat u sinkronizuan me sukses!");
    }
</script>
</body>
</html>
