<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>GSE Admin - Kontrolli</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f111a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-box { max-width: 600px; margin: auto; background: #1a1d29; padding: 30px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { color: #00d2ff; text-transform: uppercase; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin-top: 15px; font-size: 12px; color: #888; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-primary { background: #00d2ff; color: black; }
        .btn-add { background: #39ff14; color: black; }
        .btn-reset { background: #ff3131; color: white; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2><i class="fas fa-edit"></i> 1. Detajet e Terminit</h2>
    <label>Titulli</label><input type="text" id="titulli" placeholder="Psh: Termin Futbolli">
    <label>Vendi</label><input type="text" id="vendi" placeholder="Psh: Fusha Drenas">
    <div style="display: flex; gap: 10px;">
        <div style="flex:1;"><label>Data</label><input type="text" id="data" placeholder="Psh: 26 Mars"></div>
        <div style="flex:1;"><label>Ora</label><input type="text" id="ora" placeholder="Psh: 20:00"></div>
    </div>
    <button class="btn btn-primary" onclick="ruajDetajet()">Përditëso Faqen</button>
</div>

<div class="admin-box">
    <h2><i class="fas fa-user-plus"></i> 2. Regjistro Lojtar</h2>
    <div style="display: flex; gap: 10px;">
        <div style="flex:2;"><label>Emri</label><input type="text" id="newPlayerName" placeholder="Emri Mbiemri"></div>
        <div style="flex:1;"><label>ID</label><input type="text" id="newPlayerId" placeholder="ID"></div>
    </div>
    <button class="btn btn-add" onclick="shtoLojtarin()">Shto në Sistem</button>
</div>

<div class="admin-box">
    <h2><i class="fas fa-sync"></i> 3. Opsionet</h2>
    <button class="btn btn-reset" onclick="resetLista()">Fshij Konfirmimet (Reset Javor)</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function ruajDetajet() {
        db.collection("config").doc("main").set({
            titulli: document.getElementById('titulli').value,
            vendi: document.getElementById('vendi').value,
            data: document.getElementById('data').value,
            ora: document.getElementById('ora').value
        }).then(() => alert("U ruajtën!")).catch(e => alert("Gabim: " + e.message));
    }

    async function shtoLojtarin() {
        const emri = document.getElementById('newPlayerName').value.trim();
        const idVal = document.getElementById('newPlayerId').value.trim();
        if(!emri || !idVal) { alert("Plotësoji të gjitha!"); return; }

        const docRef = db.collection("config").doc("staff");
        try {
            const doc = await docRef.get();
            let lojtaret = doc.exists ? (doc.data().lojtaret || []) : [];
            lojtaret.push({ id: idVal, n: emri, s: Array(31).fill("OFF") });
            await docRef.set({ lojtaret: lojtaret });
            alert("U shtua!");
        } catch(e) { alert("Gabim: " + e.message); }
    }

    function resetLista() {
        if(confirm("A dëshiron t'i fshish konfirmimet?")) {
            db.collection("terminet").get().then(snap => {
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                batch.commit().then(() => alert("Lista u pastrua!"));
            });
        }
    }
</script>
</body>
</html>
